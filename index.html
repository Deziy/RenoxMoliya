<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenoxMoliya – Moliyaviy Daftar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
/* ===== DESIGN TOKENS — UI/UX Pro Max: Soft UI Evolution + Glassmorphism ===== */
/* Pattern: Financial Dashboard | Style: Dark + Emerald | Font: Inter tabular */
:root {
  --bg:          #0f1117;
  --bg2:         #161b27;
  --surface:     #1e2436;
  --surface2:    #252d42;
  --border:      rgba(255,255,255,0.07);
  --border2:     rgba(255,255,255,0.12);

  --green:       #10b981;
  --green-dim:   rgba(16,185,129,0.14);
  --green-glow:  rgba(16,185,129,0.28);
  --red:         #ef4444;
  --red-dim:     rgba(239,68,68,0.14);
  --gold:        #fbbf24;
  --gold-dim:    rgba(251,191,36,0.14);

  --text:        #f1f5f9;
  --text2:       #94a3b8;
  --text3:       #64748b;

  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px; --r-full: 9999px;
  --sh-md: 0 4px 20px rgba(0,0,0,.5);
  --sh-lg: 0 8px 40px rgba(0,0,0,.65);
  --ease: cubic-bezier(.16,1,.3,1);
  --fast: 140ms; --mid: 240ms; --slow: 340ms;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  min-height:100dvh;line-height:1.5;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}

/* ===== AUTH ===== */
#auth-screen{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:
    radial-gradient(ellipse 80% 50% at 50% -5%,rgba(16,185,129,.13),transparent),
    radial-gradient(ellipse 60% 40% at 85% 85%,rgba(99,102,241,.08),transparent),
    var(--bg);
}
.auth-card{
  width:100%;max-width:400px;background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--r-xl);
  padding:48px 40px;text-align:center;
  box-shadow:var(--sh-lg),inset 0 1px 0 rgba(255,255,255,.05);
}
.auth-logo{
  width:68px;height:68px;
  background:linear-gradient(135deg,var(--green),#059669);
  border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;font-size:30px;
  box-shadow:0 8px 28px var(--green-glow);
}
.auth-title{font-size:26px;font-weight:800;letter-spacing:-.6px;margin-bottom:8px}
.auth-sub{color:var(--text2);font-size:14px;margin-bottom:36px;line-height:1.65}
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:14px 24px;background:rgba(255,255,255,.05);
  border:1px solid var(--border2);border-radius:var(--r-md);
  font-size:15px;font-weight:500;color:var(--text);
  transition:all var(--mid) var(--ease);touch-action:manipulation;min-height:52px;
}
.btn-google:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
.btn-google:active{transform:scale(.97)}

/* ===== APP ===== */
#app-screen{display:none;min-height:100dvh;flex-direction:column}
#app-screen.on{display:flex}

/* ===== NAVBAR ===== */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:62px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-logo{
  width:34px;height:34px;border-radius:var(--r-sm);
  background:linear-gradient(135deg,var(--green),#059669);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
}
.nav-title{font-size:17px;font-weight:700;letter-spacing:-.3px}

/* Account pill */
.acc-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-full);
  padding:5px 10px;flex:1;max-width:210px;
  transition:border-color var(--fast) var(--ease);
}
.acc-pill:hover{border-color:var(--green)}
.acc-arrow{
  width:28px;height:28px;border-radius:var(--r-full);color:var(--text2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all var(--fast) var(--ease);cursor:pointer;touch-action:manipulation;
}
.acc-arrow:hover{color:var(--text);background:var(--surface2)}
.acc-arrow:active{transform:scale(.88)}
.acc-label{flex:1;text-align:center;font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.nav-right{display:flex;align-items:center;gap:8px}
.icon-btn{
  width:38px;height:38px;border-radius:var(--r-full);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--fast) var(--ease);cursor:pointer;touch-action:manipulation;
}
.icon-btn:hover{color:var(--text);background:var(--surface)}
.icon-btn:active{transform:scale(.88)}
.avatar{
  width:36px;height:36px;border-radius:var(--r-full);
  background:linear-gradient(135deg,var(--green),#059669);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;cursor:pointer;flex-shrink:0;
  border:2px solid transparent;transition:border-color var(--fast) var(--ease);overflow:hidden;
}
.avatar:hover{border-color:var(--green)}
.avatar img{width:100%;height:100%;object-fit:cover}

/* ===== MAIN ===== */
.main{flex:1;padding:24px;max-width:940px;margin:0 auto;width:100%}

/* ===== STATS ===== */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:20px;position:relative;overflow:hidden;
  transition:border-color var(--mid) var(--ease);
}
.stat::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 55%);
  pointer-events:none;
}
.stat.income{border-top:2px solid var(--green)}
.stat.expense{border-top:2px solid var(--red)}
.stat.balance{border-top:2px solid var(--gold)}
.stat-label{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;
  font-variant-numeric:tabular-nums;line-height:1.15}
.stat-val.income{color:var(--green)}
.stat-val.expense{color:var(--red)}
.stat-val.pos{color:var(--gold)}
.stat-val.neg{color:var(--red)}

/* shimmer skeleton */
.skel{
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:sh 1.4s infinite;border-radius:var(--r-sm);
}
@keyframes sh{to{background-position:-200% 0}}
.skel-stat{height:26px;width:70%}

/* ===== SECTION HEAD ===== */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:17px;font-weight:600;letter-spacing:-.2px}
.badge{
  background:var(--surface2);color:var(--text2);
  font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--r-full);
}
.btn-add{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px;background:var(--green);color:#fff;border-radius:var(--r-full);
  font-size:13px;font-weight:600;
  box-shadow:0 4px 14px var(--green-glow);
  transition:all var(--fast) var(--ease);touch-action:manipulation;min-height:38px;
}
.btn-add:hover{background:#059669;transform:translateY(-1px);box-shadow:0 6px 18px rgba(16,185,129,.4)}
.btn-add:active{transform:scale(.97)}

/* ===== TX LIST ===== */
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  padding:14px 16px;transition:all var(--fast) var(--ease);
  animation:fadeUp var(--mid) var(--ease) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.tx:hover{border-color:var(--border2);background:var(--surface2)}
.tx-ico{
  width:44px;height:44px;flex-shrink:0;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.tx-ico.income{background:var(--green-dim)}
.tx-ico.expense{background:var(--red-dim)}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--text3);margin-top:2px}
.tx-amt{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;
  letter-spacing:-.3px;white-space:nowrap}
.tx-amt.income{color:var(--green)}
.tx-amt.expense{color:var(--red)}
.tx-del{
  width:32px;height:32px;flex-shrink:0;border-radius:var(--r-sm);color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--fast) var(--ease);touch-action:manipulation;opacity:0;
}
.tx:hover .tx-del{opacity:1}
.tx-del:hover{color:var(--red);background:var(--red-dim)}
.tx-del:active{transform:scale(.88)}

/* ===== SKELETON ITEMS ===== */
.skel-item{height:74px;border-radius:var(--r-md);margin-bottom:8px}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:64px 24px;color:var(--text3)}
.empty-ico{font-size:52px;margin-bottom:16px;opacity:.45}
.empty-t{font-size:17px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-d{font-size:14px;line-height:1.65}

/* ===== MODAL ===== */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.62);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity var(--mid) var(--ease);
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  width:100%;max-width:440px;background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--r-xl);padding:36px;
  box-shadow:var(--sh-lg),inset 0 1px 0 rgba(255,255,255,.05);
  transform:translateY(14px) scale(.97);transition:transform var(--slow) var(--ease);
}
.overlay.open .modal{transform:none}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.close-btn{
  width:32px;height:32px;border-radius:var(--r-full);color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--fast) var(--ease);cursor:pointer;touch-action:manipulation;
}
.close-btn:hover{background:var(--surface2);color:var(--text)}
.close-btn:active{transform:scale(.88)}

/* type toggle */
.type-row{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
  background:var(--bg2);border-radius:var(--r-md);padding:4px;margin-bottom:20px;
}
.type-btn{
  padding:11px;border-radius:var(--r-sm);font-size:14px;font-weight:600;
  color:var(--text3);transition:all var(--fast) var(--ease);cursor:pointer;
  touch-action:manipulation;min-height:42px;
}
.type-btn.on.income{background:var(--green-dim);color:var(--green)}
.type-btn.on.expense{background:var(--red-dim);color:var(--red)}
.type-btn:not(.on):hover{color:var(--text2);background:rgba(255,255,255,.04)}

/* form */
.fg{margin-bottom:16px}
.label{
  display:block;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;color:var(--text2);margin-bottom:8px;
}
.inp{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:12px 16px;color:var(--text);font-size:15px;
  font-family:inherit;min-height:50px;
  transition:border-color var(--fast) var(--ease),box-shadow var(--fast) var(--ease);
  outline:none;-webkit-appearance:none;appearance:none;
}
.inp:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim)}
.inp::placeholder{color:var(--text3)}

/* category chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{
  padding:6px 13px;border-radius:var(--r-full);font-size:12px;font-weight:500;
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);
  cursor:pointer;transition:all var(--fast) var(--ease);touch-action:manipulation;
}
.chip:hover{border-color:var(--green);color:var(--text)}
.chip.on{background:var(--green-dim);border-color:var(--green);color:var(--green);font-weight:600}

/* submit */
.btn-submit{
  width:100%;padding:16px;border-radius:var(--r-md);font-size:15px;font-weight:600;
  color:#fff;background:var(--green);margin-top:8px;
  box-shadow:0 4px 14px var(--green-glow);
  transition:all var(--fast) var(--ease);touch-action:manipulation;min-height:54px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:hover{background:#059669;transform:translateY(-1px);box-shadow:0 6px 18px rgba(16,185,129,.4)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ===== ACCOUNTS MODAL ===== */
.acc-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:250px;overflow-y:auto}
.acc-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:var(--r-md);
  border:1px solid var(--border);background:var(--bg2);
  cursor:pointer;transition:all var(--fast) var(--ease);touch-action:manipulation;
}
.acc-row:hover,.acc-row.on{border-color:var(--green);background:var(--green-dim)}
.acc-row-ico{
  width:38px;height:38px;border-radius:var(--r-sm);background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.acc-row-name{flex:1;font-weight:600;font-size:14px}
.acc-row-del{
  width:30px;height:30px;border-radius:var(--r-sm);color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--fast) var(--ease);cursor:pointer;
}
.acc-row-del:hover{color:var(--red);background:var(--red-dim)}
.hr{height:1px;background:var(--border);margin:16px 0}
.new-row{display:flex;gap:8px}
.new-row .inp{flex:1;margin:0}
.btn-create{
  padding:12px 16px;background:var(--green);color:#fff;border-radius:var(--r-md);
  font-size:14px;font-weight:600;white-space:nowrap;
  transition:all var(--fast) var(--ease);touch-action:manipulation;min-height:50px;
}
.btn-create:hover{background:#059669}
.btn-create:active{transform:scale(.97)}

/* ===== USER DROPDOWN ===== */
.user-drop{
  position:fixed;top:68px;right:24px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:8px;min-width:200px;box-shadow:var(--sh-md);z-index:150;
  display:none;animation:fadeUp var(--mid) var(--ease);
}
.user-drop.on{display:block}
.user-info{padding:12px 16px}
.user-name{font-weight:600;font-size:14px}
.user-email{font-size:12px;color:var(--text3);margin-top:2px}
.menu-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:500;
  color:var(--text2);cursor:pointer;transition:all var(--fast) var(--ease);
}
.menu-item:hover{background:var(--surface2);color:var(--text)}
.menu-item.danger{color:var(--red)}
.menu-item.danger:hover{background:var(--red-dim)}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);
  padding:12px 20px;font-size:14px;font-weight:500;box-shadow:var(--sh-md);
  z-index:300;transform:translateY(12px);opacity:0;
  transition:all var(--mid) var(--ease);pointer-events:none;
  display:flex;align-items:center;gap:8px;
}
.toast.on{opacity:1;transform:none}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .nav{padding:0 16px}
  .main{padding:16px}
  .stats{grid-template-columns:1fr;gap:12px}
  .stat-val{font-size:20px}
  .overlay{padding:16px;align-items:flex-end}
  .modal{border-bottom-left-radius:0;border-bottom-right-radius:0;max-width:100%}
  .acc-pill{max-width:150px}
  .toast{right:16px;left:16px}
  .tx-del{opacity:1}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">💰</div>
    <h1 class="auth-title">RenoxMoliya</h1>
    <p class="auth-sub">Shaxsiy moliyangizni oson va qulay boshqaring</p>
    <button class="btn-google" id="sign-in-btn" onclick="signInG()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google bilan kirish
    </button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo">💰</div>
      <span class="nav-title">RenoxMoliya</span>
    </div>

    <div class="acc-pill">
      <button class="acc-arrow" onclick="prevAcc()" title="Oldingi hisob" aria-label="Oldingi hisob">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="acc-label" id="acc-name">Asosiy</span>
      <button class="acc-arrow" onclick="nextAcc()" title="Keyingi hisob" aria-label="Keyingi hisob">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="nav-right">
      <button class="icon-btn" onclick="openAccModal()" title="Hisoblar" aria-label="Hisoblarni boshqarish">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </button>
      <div class="avatar" id="user-av" onclick="toggleMenu()" role="button" tabindex="0" aria-label="Mening profilim" aria-expanded="false">
        <span id="av-txt">U</span>
      </div>
    </div>
  </nav>

  <!-- User dropdown -->
  <div class="user-drop" id="user-drop" role="menu">
    <div class="user-info">
      <div class="user-name" id="m-name">–</div>
      <div class="user-email" id="m-email">–</div>
    </div>
    <div style="height:1px;background:var(--border);margin:4px 0"></div>
    <div class="menu-item danger" onclick="signOutU()" role="menuitem">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Chiqish
    </div>
  </div>

  <main class="main">
    <!-- Stats -->
    <div class="stats">
      <div class="stat income">
        <div class="stat-label"><span class="dot" style="background:var(--green)"></span>Kirim</div>
        <div class="stat-val income" id="s-in"><div class="skel skel-stat"></div></div>
      </div>
      <div class="stat expense">
        <div class="stat-label"><span class="dot" style="background:var(--red)"></span>Chiqim</div>
        <div class="stat-val expense" id="s-out"><div class="skel skel-stat"></div></div>
      </div>
      <div class="stat balance">
        <div class="stat-label"><span class="dot" style="background:var(--gold)"></span>Balans</div>
        <div class="stat-val pos" id="s-bal"><div class="skel skel-stat"></div></div>
      </div>
    </div>

    <!-- Transactions -->
    <div class="sec-head">
      <div style="display:flex;align-items:center;gap:10px">
        <h2 class="sec-title">Tranzaksiyalar</h2>
        <span class="badge" id="tx-cnt">0</span>
      </div>
      <button class="btn-add" onclick="openTxModal()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Qo'shish
      </button>
    </div>

    <div class="tx-list" id="tx-list">
      <div class="skel skel-item"></div>
      <div class="skel skel-item"></div>
      <div class="skel skel-item"></div>
    </div>
  </main>
</div>

<!-- TX MODAL -->
<div class="overlay" id="tx-ov" role="dialog" aria-modal="true" aria-labelledby="tx-title">
  <div class="modal">
    <div class="modal-head">
      <h2 class="modal-title" id="tx-title">Tranzaksiya qo'shish</h2>
      <button class="close-btn" onclick="closeTxModal()" aria-label="Yopish">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="type-row" role="group" aria-label="Tur">
      <button class="type-btn on income" id="tb-in" onclick="setType('income')" aria-pressed="true">↑ Kirim</button>
      <button class="type-btn expense"    id="tb-out" onclick="setType('expense')" aria-pressed="false">↓ Chiqim</button>
    </div>

    <div class="fg">
      <label class="label" for="f-amt">Summa (UZS)</label>
      <input class="inp" id="f-amt" type="number" min="0" placeholder="0" inputmode="numeric">
    </div>
    <div class="fg">
      <label class="label">Kategoriya</label>
      <div class="chips" id="chips" role="group"></div>
    </div>
    <div class="fg">
      <label class="label" for="f-note">Izoh (ixtiyoriy)</label>
      <input class="inp" id="f-note" type="text" placeholder="Qisqacha izoh…" maxlength="80">
    </div>
    <div class="fg">
      <label class="label" for="f-date">Sana</label>
      <input class="inp" id="f-date" type="date">
    </div>

    <button class="btn-submit" id="tx-sub" onclick="submitTx()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Saqlash
    </button>
  </div>
</div>

<!-- ACCOUNTS MODAL -->
<div class="overlay" id="acc-ov" role="dialog" aria-modal="true" aria-labelledby="acc-title">
  <div class="modal">
    <div class="modal-head">
      <h2 class="modal-title" id="acc-title">Hisoblar</h2>
      <button class="close-btn" onclick="closeAccModal()" aria-label="Yopish">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="acc-list" id="acc-list" role="list"></div>
    <div class="hr"></div>
    <div class="new-row">
      <input class="inp" id="new-acc" type="text" placeholder="Yangi hisob nomi…" maxlength="28">
      <button class="btn-create" onclick="createAcc()">Yaratish</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<script>
// ===== FIREBASE CONFIG — o'zingiznikini qo'ying =====
const FB = {
  apiKey:"AIzaSyB64ULy8Pw_S9e88k--ws1wkxPCBmQTZH8",
  authDomain:"renoxmoliya.firebaseapp.com",
  projectId:"renoxmoliya",
  storageBucket:"renoxmoliya.firebasestorage.app",
  messagingSenderId:"803391523579",
  appId:"1:803391523579:web:bdcfed75ea17fb8f257e5e",
  measurementId:"G-LNF47VHWNF"
};
firebase.initializeApp(FB);
const auth=firebase.auth(), db=firebase.firestore();
const GP=new firebase.auth.GoogleAuthProvider();

// ===== STATE =====
let user=null, accounts=[], accIdx=0, txType='income', selCat='', unsubTx=null;

const CATS={
  income: ['Maosh','Biznes','Freelance','Sovg\'a','Investitsiya','Boshqa'],
  expense:['Oziq-ovqat','Transport','Uy','Salomatlik','Ta\'lim','Kiyim','Ko\'ngilochar','Kommunal','Boshqa']
};
const ICONS={
  'Maosh':'💼','Biznes':'🏢','Freelance':'💻',"Sovg'a":'🎁','Investitsiya':'📈',
  'Oziq-ovqat':'🛒','Transport':'🚗','Uy':'🏠','Salomatlik':'❤️',"Ta'lim":'📚',
  'Kiyim':'👗',"Ko'ngilochar":'🎮','Kommunal':'⚡','Boshqa':'📋'
};
const ACC_EMOJIS=['💳','🏦','💵','🪙','📊','💎'];

// ===== AUTH =====
auth.onAuthStateChanged(u=>{
  if(u){user=u;showApp(u);loadAccs();}
  else{showAuth();}
});

function signInG(){
  const b=document.getElementById('sign-in-btn');
  b.disabled=true;b.textContent='Yuklanmoqda…';
  auth.signInWithPopup(GP).catch(e=>{
    b.disabled=false;
    b.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24">...</svg> Google bilan kirish';
    toast('Xatolik: '+e.message,'error');
  });
}
function signOutU(){closeMenu();auth.signOut();}

function showApp(u){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').classList.add('on');
  const n=u.displayName||'Foydalanuvchi';
  document.getElementById('av-txt').textContent=n[0].toUpperCase();
  document.getElementById('m-name').textContent=n;
  document.getElementById('m-email').textContent=u.email||'';
  if(u.photoURL){
    const av=document.getElementById('user-av');
    av.innerHTML=`<img src="${u.photoURL}" alt="${esc(n)}">`;
  }
}
function showAuth(){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-screen').classList.remove('on');
  user=null;accounts=[];
}

// ===== ACCOUNTS =====
const uRef=()=>db.collection('users').doc(user.uid);
const txCol=(id)=>uRef().collection('transactions_'+id);

async function loadAccs(){
  try{
    const snap=await uRef().collection('accounts').orderBy('createdAt').get();
    accounts=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!accounts.length){
      const r=await uRef().collection('accounts').add({name:'Asosiy hisob',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      accounts=[{id:r.id,name:'Asosiy hisob'}];
      await migrateOld(r.id);
    }
    accIdx=0;updAccUI();subTxs();
  }catch(e){toast('Xatolik: '+e.message,'error');}
}

async function migrateOld(newId){
  try{
    const old=await uRef().collection('transactions').limit(200).get();
    if(old.empty)return;
    const batch=db.batch();
    old.docs.forEach(d=>{batch.set(txCol(newId).doc(d.id),d.data());batch.delete(d.ref);});
    await batch.commit();
  }catch(e){console.error('Migration:',e);}
}

const curAcc=()=>accounts[accIdx]||accounts[0];
function updAccUI(){
  const a=curAcc();
  if(a)document.getElementById('acc-name').textContent=a.name;
}
function prevAcc(){if(accounts.length<2)return;accIdx=(accIdx-1+accounts.length)%accounts.length;updAccUI();subTxs();}
function nextAcc(){if(accounts.length<2)return;accIdx=(accIdx+1)%accounts.length;updAccUI();subTxs();}

function openAccModal(){renderAccList();document.getElementById('acc-ov').classList.add('open');}
function closeAccModal(){document.getElementById('acc-ov').classList.remove('open');document.getElementById('new-acc').value='';}

function renderAccList(){
  document.getElementById('acc-list').innerHTML=accounts.map((a,i)=>`
    <div class="acc-row ${i===accIdx?'on':''}" onclick="switchAcc(${i})" role="listitem">
      <div class="acc-row-ico">${ACC_EMOJIS[i%ACC_EMOJIS.length]}</div>
      <div class="acc-row-name">${esc(a.name)}</div>
      ${accounts.length>1?`<button class="acc-row-del" onclick="event.stopPropagation();delAcc('${a.id}',${i})" aria-label="O'chirish"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>`:''}
    </div>`).join('');
}
function switchAcc(i){accIdx=i;updAccUI();subTxs();renderAccList();closeAccModal();}

async function createAcc(){
  const inp=document.getElementById('new-acc');
  const name=inp.value.trim();
  if(!name){inp.focus();return;}
  try{
    const r=await uRef().collection('accounts').add({name,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    accounts.push({id:r.id,name});
    accIdx=accounts.length-1;updAccUI();subTxs();renderAccList();
    inp.value='';toast('Hisob yaratildi','success');
  }catch(e){toast('Xatolik: '+e.message,'error');}
}

async function delAcc(id,i){
  if(!confirm(`"${accounts[i]?.name}" hisobini o'chirasizmi?`))return;
  try{
    const snap=await txCol(id).limit(300).get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    batch.delete(uRef().collection('accounts').doc(id));
    await batch.commit();
    accounts.splice(i,1);
    if(accIdx>=accounts.length)accIdx=accounts.length-1;
    updAccUI();subTxs();renderAccList();toast("Hisob o'chirildi",'success');
  }catch(e){toast('Xatolik: '+e.message,'error');}
}

// ===== TRANSACTIONS =====
function subTxs(){
  if(unsubTx)unsubTx();
  const a=curAcc();if(!a)return;
  document.getElementById('tx-list').innerHTML='<div class="skel skel-item"></div><div class="skel skel-item"></div><div class="skel skel-item"></div>';
  unsubTx=txCol(a.id).orderBy('date','desc').onSnapshot(snap=>{
    const txs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTxs(txs);renderStats(txs);
  },e=>toast('Xatolik: '+e.message,'error'));
}

function renderTxs(txs){
  const el=document.getElementById('tx-list');
  document.getElementById('tx-cnt').textContent=txs.length;
  if(!txs.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">📋</div><div class="empty-t">Tranzaksiya yo'q</div><div class="empty-d">Birinchi yozuvni qo'shish uchun<br>+ tugmani bosing</div></div>`;
    return;
  }
  el.innerHTML=txs.map((t,i)=>{
    const ico=ICONS[t.category]||(t.type==='income'?'💰':'💸');
    return `<div class="tx" style="animation-delay:${Math.min(i,9)*25}ms">
      <div class="tx-ico ${t.type}">${ico}</div>
      <div class="tx-info">
        <div class="tx-cat">${esc(t.category)}${t.note?' · '+esc(t.note):''}</div>
        <div class="tx-meta">${fmtDate(t.date)}</div>
      </div>
      <div class="tx-amt ${t.type}">${t.type==='income'?'+':'−'}${fmtN(t.amount)} UZS</div>
      <button class="tx-del" onclick="delTx('${t.id}')" aria-label="O'chirish">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('');
}

function renderStats(txs){
  let income=0,expense=0;
  txs.forEach(t=>{if(t.type==='income')income+=t.amount;else expense+=t.amount;});
  const bal=income-expense;
  document.getElementById('s-in').textContent=fmtN(income)+' UZS';
  document.getElementById('s-out').textContent=fmtN(expense)+' UZS';
  const b=document.getElementById('s-bal');
  b.textContent=fmtN(Math.abs(bal))+' UZS';
  b.className='stat-val '+(bal>=0?'pos':'neg');
}

// ===== TX MODAL =====
function openTxModal(){
  setType('income');
  document.getElementById('f-amt').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('tx-ov').classList.add('open');
  setTimeout(()=>document.getElementById('f-amt').focus(),300);
}
function closeTxModal(){document.getElementById('tx-ov').classList.remove('open');}

function setType(t){
  txType=t;selCat='';
  const bi=document.getElementById('tb-in'),bo=document.getElementById('tb-out');
  bi.className='type-btn '+(t==='income'?'on income':'');
  bo.className='type-btn '+(t==='expense'?'on expense':'');
  bi.setAttribute('aria-pressed',t==='income');
  bo.setAttribute('aria-pressed',t==='expense');
  renderChips();
}
function renderChips(){
  document.getElementById('chips').innerHTML=CATS[txType].map(c=>`
    <button class="chip ${c===selCat?'on':''}" onclick="selChip('${c}')" aria-pressed="${c===selCat}">${c}</button>`).join('');
}
function selChip(c){selCat=c;renderChips();}

async function submitTx(){
  const amt=parseFloat(document.getElementById('f-amt').value);
  const note=document.getElementById('f-note').value.trim();
  const date=document.getElementById('f-date').value;
  if(!amt||amt<=0){document.getElementById('f-amt').focus();toast('Summani kiriting','error');return;}
  if(!selCat){toast('Kategoriya tanlang','error');return;}
  if(!date){toast('Sanani kiriting','error');return;}
  const btn=document.getElementById('tx-sub');
  btn.disabled=true;
  btn.innerHTML='<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Saqlanmoqda…';
  try{
    await txCol(curAcc().id).add({type:txType,amount:amt,category:selCat,note,date,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    closeTxModal();toast('Tranzaksiya saqlandi','success');
  }catch(e){toast('Xatolik: '+e.message,'error');}
  finally{
    btn.disabled=false;
    btn.innerHTML='<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Saqlash';
  }
}

async function delTx(id){
  try{await txCol(curAcc().id).doc(id).delete();toast("O'chirildi",'success');}
  catch(e){toast('Xatolik: '+e.message,'error');}
}

// ===== USER MENU =====
function toggleMenu(){
  const d=document.getElementById('user-drop'),av=document.getElementById('user-av');
  const o=d.classList.toggle('on');av.setAttribute('aria-expanded',o);
}
function closeMenu(){document.getElementById('user-drop').classList.remove('on');document.getElementById('user-av').setAttribute('aria-expanded','false');}
document.addEventListener('click',e=>{
  if(!e.target.closest('#user-av')&&!e.target.closest('#user-drop'))closeMenu();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeTxModal();closeAccModal();closeMenu();}
});

// ===== TOAST =====
let _tt;
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} on`;
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),3000);
}

// ===== UTILS =====
const fmtN=n=>Math.round(n||0).toLocaleString('uz-UZ');
const fmtDate=d=>{try{return new Date(d+'T00:00:00').toLocaleDateString('uz-UZ',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// init
renderChips();
</script>
</body>
</html>
