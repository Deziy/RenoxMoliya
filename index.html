<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenoxMoliya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><text y='78' x='50' text-anchor='middle' font-size='70' font-family='serif' font-weight='900' fill='white'>R</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f14;
  --bg2:#13141b;
  --bg3:#1a1c26;
  --bg4:#21243a;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;
  --muted:rgba(255,255,255,0.38);
  --muted2:rgba(255,255,255,0.55);
  --income:#4ade80;
  --expense:#f87171;
  --accent:#6366f1;
  --accent2:#818cf8;
}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button,input,select{font-family:inherit;cursor:pointer}

.shell{display:flex;flex-direction:column;height:100vh}

/* topbar */
.topbar{
  padding:16px 40px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:20px;
  background:var(--bg2);flex-shrink:0;
}
.logo{
  font-size:22px;font-weight:800;letter-spacing:-0.5px;
  display:flex;align-items:center;gap:12px;margin-right:24px;
  text-decoration:none;color:var(--text);
}
.logo-img{
  width:38px;height:38px;border-radius:11px;
  object-fit:cover;flex-shrink:0;
}
.logo-svg{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
}
.month-nav{display:flex;align-items:center;gap:14px}
.mnav-btn{
  width:38px;height:38px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--muted2);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.mnav-btn:hover{background:var(--bg4);color:var(--text)}
.month-label{font-size:22px;font-weight:700;min-width:160px;text-align:center;letter-spacing:-0.3px}

/* content */
.content{flex:1;overflow-y:auto;padding:32px 40px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* summary bar */
.summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:32px}
.sum-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:22px 26px;
  transition:transform .2s,border-color .2s;
}
.sum-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.sum-label{font-size:13px;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;font-weight:600}
.sum-val{font-family:'JetBrains Mono';font-size:28px;font-weight:700;line-height:1}
.sum-val.income{color:var(--income)}
.sum-val.expense{color:var(--expense)}
.sum-val.total{color:var(--text)}
.sum-sub{font-size:13px;color:var(--muted);margin-top:6px}

/* day group */
.day-group{margin-bottom:24px}
.day-header{
  display:grid;grid-template-columns:auto 1fr auto auto;
  align-items:center;gap:14px;
  margin-bottom:10px;padding:0 6px;
}
.day-num{font-size:28px;font-weight:800;color:var(--text);font-family:'JetBrains Mono';line-height:1}
.day-info{display:flex;flex-direction:column;gap:2px}
.day-name{
  font-size:13px;font-weight:700;letter-spacing:1px;
  background:var(--bg4);color:var(--muted2);
  padding:3px 10px;border-radius:6px;
  display:inline-block;border:1px solid var(--border2);
}
.day-date{font-size:12px;color:var(--muted)}
.day-inc{font-family:'JetBrains Mono';font-size:14px;color:var(--income);font-weight:600}
.day-exp{font-family:'JetBrains Mono';font-size:14px;color:var(--expense);font-weight:600}

.txn-list{display:flex;flex-direction:column;gap:3px}
.txn-row{
  display:grid;grid-template-columns:44px 1fr auto;
  align-items:center;gap:14px;
  padding:14px 18px;border-radius:12px;
  background:var(--bg2);border:1px solid var(--border);
  transition:all .2s;cursor:pointer;
}
.txn-row:hover{background:var(--bg3);border-color:var(--border2);transform:translateX(3px)}
.txn-ico{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;background:var(--bg3);
  border:1px solid var(--border);flex-shrink:0;
}
.txn-info{min-width:0}
.txn-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-cat{font-size:13px;color:var(--muted)}
.txn-amt{font-family:'JetBrains Mono';font-size:16px;font-weight:700;white-space:nowrap}
.txn-amt.inc{color:var(--income)}
.txn-amt.exp{color:var(--expense)}

/* empty */
.empty-state{text-align:center;padding:64px 20px;color:var(--muted);font-size:16px}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.35;display:block}

/* FAB */
.fab{
  position:fixed;bottom:36px;right:36px;
  width:64px;height:64px;border-radius:20px;
  background:var(--accent);color:#fff;
  font-size:32px;font-weight:300;line-height:1;
  border:none;
  box-shadow:0 8px 32px rgba(99,102,241,0.5);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;
  z-index:50;
}
.fab:hover{background:var(--accent2);transform:scale(1.1) rotate(90deg);box-shadow:0 12px 40px rgba(99,102,241,0.7)}
.fab:active{transform:scale(.95)}

/* modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.65);
  z-index:100;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:22px;padding:32px;width:420px;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-size:20px;font-weight:800}
.modal-close{background:none;border:none;color:var(--muted);font-size:26px;line-height:1;transition:color .2s}
.modal-close:hover{color:var(--text)}

/* form */
.form-tabs{display:flex;gap:4px;margin-bottom:20px;
  background:var(--bg3);border-radius:10px;padding:4px;border:1px solid var(--border)}
.ftab{flex:1;padding:10px;text-align:center;border-radius:7px;font-size:14px;font-weight:700;
  color:var(--muted);transition:all .2s;letter-spacing:0.5px}
.ftab.active.inc{background:rgba(74,222,128,0.15);color:var(--income);border:1px solid rgba(74,222,128,0.25)}
.ftab.active.exp{background:rgba(248,113,113,0.15);color:var(--expense);border:1px solid rgba(248,113,113,0.25)}
.ftab:hover:not(.active){color:var(--muted2)}
.f-row{margin-bottom:14px}
.f-label{font-size:12px;letter-spacing:1.2px;color:var(--muted);margin-bottom:6px;font-weight:600}
.f-input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:12px 14px;color:var(--text);
  font-size:15px;outline:none;transition:border-color .2s;
}
.f-input:focus{border-color:var(--accent)}
.f-input::placeholder{color:var(--muted)}
.f-select{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:12px 14px;color:var(--text);
  font-size:15px;outline:none;appearance:none;
}
.f-select option{background:var(--bg2)}
.btn-add{
  width:100%;padding:14px;border-radius:11px;
  background:var(--accent);color:#fff;
  font-size:15px;font-weight:700;letter-spacing:0.5px;
  border:none;transition:all .25s;margin-top:6px;
}
.btn-add:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-add:active{transform:scale(.98)}
</style>
</head>
<body>

<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <svg width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <!-- background -->
        <rect width="44" height="44" rx="12" fill="#13141b"/>
        <!-- indigo border -->
        <rect x="1" y="1" width="42" height="42" rx="11" fill="none" stroke="#6366f1" stroke-width="1.5"/>
        <!-- R harfi -->
        <text x="22" y="31" text-anchor="middle" font-size="26" font-family="Syne,Georgia,serif" font-weight="900" fill="#6366f1">R</text>
        <!-- yashil nuqta - pastki o'ng burchak -->
        <circle cx="33" cy="33" r="5" fill="#0e0f14"/>
        <circle cx="33" cy="33" r="4" fill="#4ade80"/>
      </svg>
      <span style="display:flex;flex-direction:column;line-height:1.15">
        <span style="font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#e8eaf0">Renox<span style="color:#6366f1">Moliya</span></span>
        <span style="font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.35);font-weight:400">MOLIYAVIY DAFTAR</span>
      </span>
    </div>
    <div class="month-nav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label">May 2026</div>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- Summary -->
    <div class="summary-bar">
      <div class="sum-card">
        <div class="sum-label">KIRIM</div>
        <div class="sum-val income" id="sum-income">0</div>
        <div class="sum-sub" id="sub-income">0 ta tranzaksiya</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">CHIQIM</div>
        <div class="sum-val expense" id="sum-expense">0</div>
        <div class="sum-sub" id="sub-expense">0 ta tranzaksiya</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">JAMI</div>
        <div class="sum-val total" id="sum-total">0</div>
        <div class="sum-sub" id="sub-total">Balans</div>
      </div>
    </div>

    <!-- Transactions list -->
    <div id="txn-list-wrap"></div>

  </div>
</div>

<!-- FAB Button -->
<button class="fab" onclick="openModal()" title="Qo'shish">+</button>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div class="modal-title">Tranzaksiya qo'shish</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-tabs">
      <div class="ftab active inc" id="ftab-inc" onclick="setFType('income')">KIRIM</div>
      <div class="ftab exp" id="ftab-exp" onclick="setFType('expense')">CHIQIM</div>
    </div>
    <div class="f-row">
      <div class="f-label">SUMMA (UZS)</div>
      <input class="f-input" id="f-amount" type="number" placeholder="0" min="0">
    </div>
    <div class="f-row">
      <div class="f-label">KATEGORIYA</div>
      <select class="f-select" id="f-cat"></select>
    </div>
    <div class="f-row">
      <div class="f-label">SANA</div>
      <input class="f-input" id="f-date" type="date">
    </div>
    <button class="btn-add" onclick="addTxn()">+ Qo'shish</button>
  </div>
</div>

<script>
const MONTHS = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
const DAY_NAMES = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];

const CATS = {
  income: [{e:'📈',n:'Nomer Sotuv'},{e:'🎁',n:"Sovg'a"},{e:'🤝',n:'Qarz berdi'}],
  expense: [{e:'💵',n:'Depozit'},{e:'👾',n:'Boshqa'}]
};

// ─── Logoni rasmga almashtirish ───
// Agar papkada "logo.png" yoki "logo.svg" bo'lsa,
// quyidagi LOGO_FILE ni o'sha fayl nomi bilan almashtiring.
// Bo'lmasa '' qolsin — SVG avtomatik ko'rsatiladi.
const LOGO_FILE = '';

if (LOGO_FILE) {
  const svg = document.getElementById('logo-svg');
  const img = document.createElement('img');
  img.src = LOGO_FILE;
  img.className = 'logo-img';
  img.alt = 'RenoxMoliya';
  svg.replaceWith(img);
}

let curDate = new Date();
curDate = new Date(curDate.getFullYear(), curDate.getMonth(), 1);
let fType = 'income';
let data = [];

try { data = JSON.parse(localStorage.getItem('mf_data') || '[]'); } catch(e){ data=[]; }

function save(){
  try{ localStorage.setItem('mf_data', JSON.stringify(data)); }catch(e){}
}

const fmt = n => Number(n).toLocaleString('uz-UZ');

function changeMonth(d){
  curDate = new Date(curDate.getFullYear(), curDate.getMonth() + d, 1);
  render();
}

function setFType(t){
  fType = t;
  document.getElementById('ftab-inc').className = 'ftab' + (t==='income' ? ' active inc' : '');
  document.getElementById('ftab-exp').className = 'ftab' + (t==='expense' ? ' active exp' : '');
  buildCatSelect();
}

function buildCatSelect(){
  const sel = document.getElementById('f-cat');
  if(!sel) return;
  sel.innerHTML = CATS[fType].map(c=>`<option value="${c.n}">${c.e} ${c.n}</option>`).join('');
}

function openModal(){
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-amount').value = '';
}

function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
}

function addTxn(){
  const amt = parseFloat(document.getElementById('f-amount').value) || 0;
  const cat = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value;
  if(!amt || !date){ alert("Summa va sanani kiriting!"); return; }
  data.push({id: Date.now(), type: fType, amount: amt, desc: cat, cat, date});
  // Sana bo'yicha kamayish, bir xil sanada qo'shilish tartibini saqlash (kichik id = birinchi)
  data.sort((a,b) => {
    const dc = b.date.localeCompare(a.date);
    if(dc !== 0) return dc;
    return a.id - b.id;
  });
  save();
  closeModal();
  render();
}

function deleteTxn(id){
  if(!confirm("Bu tranzaksiyani o'chirasizmi?")) return;
  data = data.filter(x => x.id !== id);
  save();
  render();
}

function getCatMap(){
  const m = {};
  [...CATS.income, ...CATS.expense].forEach(c => m[c.n] = c.e);
  return m;
}

function render(){
  const y = curDate.getFullYear();
  const mo = curDate.getMonth();

  document.getElementById('month-label').textContent = `${MONTHS[mo]} ${y}`;

  const monthData = data.filter(x => {
    const parts = x.date.split('-');
    return parseInt(parts[0]) === y && parseInt(parts[1]) - 1 === mo;
  });

  const totalInc = monthData.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount, 0);
  const totalExp = monthData.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount, 0);
  const net = totalInc - totalExp;

  document.getElementById('sum-income').textContent = fmt(totalInc);
  document.getElementById('sum-expense').textContent = fmt(totalExp);
  document.getElementById('sum-total').textContent = (net>=0?'+':'') + fmt(net);
  document.getElementById('sum-total').style.color = net>0?'var(--income)':net<0?'var(--expense)':'var(--text)';
  document.getElementById('sub-income').textContent = monthData.filter(x=>x.type==='income').length + ' ta tranzaksiya';
  document.getElementById('sub-expense').textContent = monthData.filter(x=>x.type==='expense').length + ' ta tranzaksiya';

  const groups = {};
  monthData.forEach(x => {
    if(!groups[x.date]) groups[x.date] = [];
    groups[x.date].push(x);
  });
  const sortedDates = Object.keys(groups).sort((a,b) => b.localeCompare(a));

  const wrap = document.getElementById('txn-list-wrap');
  if(!wrap) return;

  if(!sortedDates.length){
    wrap.innerHTML = `<div class="empty-state"><span class="empty-ico">💸</span>Bu oy uchun tranzaksiya yo'q</div>`;
    return;
  }

  const catMap = getCatMap();
  wrap.innerHTML = sortedDates.map(date => {
    const items = groups[date];
    const parts = date.split('-');
    const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    const dayInc = items.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
    const dayExp = items.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);

    return `<div class="day-group">
      <div class="day-header">
        <div class="day-num">${d.getDate()}</div>
        <div class="day-info">
          <span class="day-name">${DAY_NAMES[d.getDay()]}</span>
          <span class="day-date">${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}</span>
        </div>
        ${dayInc ? `<span class="day-inc">UZS ${fmt(dayInc)}</span>` : '<span></span>'}
        ${dayExp ? `<span class="day-exp">UZS ${fmt(dayExp)}</span>` : '<span></span>'}
      </div>
      <div class="txn-list">
        ${items.map(x => {
          const ico = catMap[x.cat] || '💰';
          return `<div class="txn-row" ondblclick="deleteTxn(${x.id})" title="O'chirish uchun ikki marta bosing">
            <div class="txn-ico">${ico}</div>
            <div class="txn-info">
              <div class="txn-name">${x.desc}</div>
              <div class="txn-cat">${x.cat}</div>
            </div>
            <div class="txn-amt ${x.type==='income'?'inc':'exp'}">${x.type==='income'?'+':'-'}UZS ${fmt(x.amount)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

buildCatSelect();
render();
</script>
</body>
</html>
