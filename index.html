<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenoxMoliya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><text y='78' x='50' text-anchor='middle' font-size='70' font-family='serif' font-weight='900' fill='white'>R</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;
  --glass:rgba(255,255,255,0.06);
  --glass2:rgba(255,255,255,0.10);
  --glass3:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.10);
  --border2:rgba(255,255,255,0.18);
  --text:#f0f2ff;
  --muted:rgba(255,255,255,0.40);
  --muted2:rgba(255,255,255,0.60);
  --income:#4ade80;
  --income-glow:rgba(74,222,128,0.25);
  --expense:#f87171;
  --expense-glow:rgba(248,113,113,0.25);
  --accent:#6366f1;
  --accent2:#818cf8;
  --accent-glow:rgba(99,102,241,0.35);
}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button,input,select{font-family:inherit;cursor:pointer}

/* ── ANIMATED BACKGROUND ── */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:drift 18s infinite ease-in-out}
.orb1{width:600px;height:600px;background:radial-gradient(circle,#6366f1,transparent);top:-200px;left:-200px;animation-duration:20s}
.orb2{width:500px;height:500px;background:radial-gradient(circle,#4ade80,transparent);bottom:-150px;right:-100px;animation-duration:25s;animation-delay:-8s}
.orb3{width:400px;height:400px;background:radial-gradient(circle,#818cf8,transparent);top:40%;left:40%;animation-duration:22s;animation-delay:-4s}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-30px) scale(1.05)}
  66%{transform:translate(-20px,40px) scale(0.97)}
}

/* ── SHELL ── */
.shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* ── TOPBAR ── */
.topbar{
  padding:18px 44px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:24px;
  flex-shrink:0;
  box-shadow:0 1px 0 rgba(255,255,255,0.06);
}
.logo{display:flex;align-items:center;gap:14px;margin-right:28px;text-decoration:none;color:var(--text)}
.logo-icon{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  background:rgba(99,102,241,0.2);
  border:1px solid rgba(99,102,241,0.4);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(99,102,241,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
  transition:all .3s;
}
.logo-icon:hover{box-shadow:0 0 30px rgba(99,102,241,0.4), inset 0 1px 0 rgba(255,255,255,0.2)}
.logo-text{display:flex;flex-direction:column;line-height:1.15}
.logo-name{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo-name span{color:var(--accent2)}
.logo-sub{font-size:10px;letter-spacing:3.5px;color:var(--muted);font-weight:400}

.month-nav{display:flex;align-items:center;gap:14px}
.mnav-btn{
  width:40px;height:40px;border-radius:12px;
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--muted2);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
  backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
}
.mnav-btn:hover{background:var(--glass2);color:var(--text);border-color:var(--border2);transform:scale(1.05);box-shadow:0 4px 16px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.15)}
.mnav-btn:active{transform:scale(.95)}
.month-label{font-size:22px;font-weight:700;min-width:170px;text-align:center;letter-spacing:-0.3px}

/* loading */
.loading-bar{height:2px;background:transparent;position:relative;overflow:hidden;display:none;flex-shrink:0}
.loading-bar.active{display:block}
.loading-bar::after{content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);animation:slide 1s infinite}
@keyframes slide{to{left:140%}}

/* toast */
.toast{position:fixed;bottom:120px;right:40px;background:rgba(20,22,35,0.9);border:1px solid var(--border2);backdrop-filter:blur(20px);border-radius:14px;padding:12px 22px;font-size:15px;color:var(--muted2);z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:36px 44px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}

/* ── SUMMARY CARDS ── */
.summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:36px}
.sum-card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:22px;padding:26px 30px;
  transition:all .35s cubic-bezier(.34,1.2,.64,1);
  position:relative;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.2);
  animation:cardIn .5s cubic-bezier(.34,1.2,.64,1) both;
}
.sum-card::before{
  content:'';position:absolute;inset:0;border-radius:22px;
  background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 60%);
  pointer-events:none;
}
.sum-card:nth-child(1){animation-delay:.05s}
.sum-card:nth-child(2){animation-delay:.10s}
.sum-card:nth-child(3){animation-delay:.15s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.sum-card:hover{transform:translateY(-4px) scale(1.01);border-color:var(--border2);box-shadow:inset 0 1px 0 rgba(255,255,255,0.15),0 20px 48px rgba(0,0,0,0.3)}
.sum-card.income-card:hover{box-shadow:inset 0 1px 0 rgba(255,255,255,0.15),0 20px 48px rgba(0,0,0,0.3),0 0 40px var(--income-glow)}
.sum-card.expense-card:hover{box-shadow:inset 0 1px 0 rgba(255,255,255,0.15),0 20px 48px rgba(0,0,0,0.3),0 0 40px var(--expense-glow)}
.sum-label{font-size:14px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;font-weight:600}
.sum-val{font-family:'JetBrains Mono';font-size:36px;font-weight:700;line-height:1;transition:all .3s}
.sum-val.income{color:var(--income);text-shadow:0 0 30px var(--income-glow)}
.sum-val.expense{color:var(--expense);text-shadow:0 0 30px var(--expense-glow)}
.sum-val.total{color:var(--text)}
.sum-sub{font-size:14px;color:var(--muted);margin-top:10px}

/* ── DAY GROUP ── */
.day-group{margin-bottom:28px;animation:groupIn .4s cubic-bezier(.34,1.2,.64,1) both}
@keyframes groupIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.day-header{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:16px;margin-bottom:12px;padding:0 4px}
.day-num{font-size:38px;font-weight:800;color:var(--text);font-family:'JetBrains Mono';line-height:1;text-shadow:0 0 20px rgba(255,255,255,0.1)}
.day-info{display:flex;flex-direction:column;gap:3px}
.day-name{
  font-size:14px;font-weight:700;letter-spacing:1px;
  background:var(--glass2);color:var(--muted2);
  padding:4px 14px;border-radius:8px;display:inline-block;
  border:1px solid var(--border);
  backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
}
.day-date{font-size:13px;color:var(--muted);margin-top:2px}
.day-inc{font-family:'JetBrains Mono';font-size:16px;color:var(--income);font-weight:700;text-shadow:0 0 12px var(--income-glow)}
.day-exp{font-family:'JetBrains Mono';font-size:16px;color:var(--expense);font-weight:700;text-shadow:0 0 12px var(--expense-glow)}

/* ── TXN ROW ── */
.txn-list{display:flex;flex-direction:column;gap:6px}
.txn-row{
  display:grid;grid-template-columns:52px 1fr auto;
  align-items:center;gap:16px;
  padding:18px 22px;border-radius:16px;
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  transition:all .28s cubic-bezier(.34,1.2,.64,1);
  cursor:pointer;
  position:relative;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
  animation:rowIn .35s cubic-bezier(.34,1.2,.64,1) both;
}
.txn-row::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 50%);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.txn-row:hover{background:var(--glass2);border-color:var(--border2);transform:translateX(6px) scale(1.005);box-shadow:inset 0 1px 0 rgba(255,255,255,0.14),0 8px 32px rgba(0,0,0,0.25)}
.txn-row:hover::before{opacity:1}
.txn-row:active{transform:translateX(3px) scale(.99)}
@keyframes rowIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.txn-ico{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  background:var(--glass2);
  border:1px solid var(--border);
  flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.12);
  transition:transform .25s;
}
.txn-row:hover .txn-ico{transform:scale(1.1) rotate(-5deg)}
.txn-info{min-width:0}
.txn-name{font-size:18px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-amt{font-family:'JetBrains Mono';font-size:20px;font-weight:700;white-space:nowrap;transition:transform .25s}
.txn-amt.inc{color:var(--income);text-shadow:0 0 16px var(--income-glow)}
.txn-amt.exp{color:var(--expense);text-shadow:0 0 16px var(--expense-glow)}
.txn-row:hover .txn-amt{transform:scale(1.05)}

/* empty */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted);font-size:18px}
.empty-ico{font-size:56px;margin-bottom:16px;opacity:.3;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ── FAB ── */
.fab{
  position:fixed;bottom:40px;right:40px;
  width:68px;height:68px;border-radius:22px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:34px;font-weight:300;line-height:1;
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 8px 32px var(--accent-glow),0 2px 8px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.25);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;justify-content:center;
  z-index:50;backdrop-filter:blur(10px);
}
.fab:hover{transform:scale(1.12) rotate(90deg);box-shadow:0 16px 48px var(--accent-glow),0 4px 16px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.3)}
.fab:active{transform:scale(.92) rotate(90deg)}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  z-index:100;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.modal-bg.open{display:flex}
.modal{
  background:rgba(15,16,28,0.85);
  border:1px solid var(--border2);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-radius:28px;padding:36px;width:440px;
  box-shadow:0 32px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.12);
  animation:modalIn .35s cubic-bezier(.34,1.4,.64,1);
  position:relative;overflow:hidden;
}
.modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
}
@keyframes modalIn{from{opacity:0;transform:scale(.88) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-size:22px;font-weight:800;letter-spacing:-0.3px}
.modal-close{background:var(--glass);border:1px solid var(--border);color:var(--muted2);font-size:20px;line-height:1;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(10px)}
.modal-close:hover{background:var(--glass2);color:var(--text);border-color:var(--border2)}

/* form */
.form-tabs{display:flex;gap:5px;margin-bottom:22px;background:rgba(255,255,255,0.04);border-radius:14px;padding:5px;border:1px solid var(--border)}
.ftab{flex:1;padding:12px;text-align:center;border-radius:10px;font-size:15px;font-weight:700;color:var(--muted);transition:all .25s;letter-spacing:0.5px}
.ftab.active.inc{background:rgba(74,222,128,0.15);color:var(--income);border:1px solid rgba(74,222,128,0.3);box-shadow:0 4px 16px rgba(74,222,128,0.15),inset 0 1px 0 rgba(255,255,255,0.1)}
.ftab.active.exp{background:rgba(248,113,113,0.15);color:var(--expense);border:1px solid rgba(248,113,113,0.3);box-shadow:0 4px 16px rgba(248,113,113,0.15),inset 0 1px 0 rgba(255,255,255,0.1)}
.ftab:hover:not(.active){color:var(--muted2);background:var(--glass)}
.f-row{margin-bottom:16px}
.f-label{font-size:12px;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;font-weight:600}
.f-input{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  color:var(--text);font-size:16px;outline:none;
  transition:all .25s;
  backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
}
.f-input:focus{border-color:rgba(99,102,241,0.6);background:rgba(99,102,241,0.08);box-shadow:0 0 0 3px rgba(99,102,241,0.15),inset 0 1px 0 rgba(255,255,255,0.08)}
.f-input::placeholder{color:var(--muted)}
.f-select{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;
  outline:none;appearance:none;backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
  transition:all .25s;
}
.f-select:focus{border-color:rgba(99,102,241,0.6);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.f-select option{background:#0f1020}
.btn-add{
  width:100%;padding:16px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:16px;font-weight:700;letter-spacing:0.5px;
  border:1px solid rgba(255,255,255,0.2);
  transition:all .3s cubic-bezier(.34,1.2,.64,1);margin-top:8px;
  box-shadow:0 6px 24px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-add:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 12px 36px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.3)}
.btn-add:active{transform:scale(.97)}
.btn-add:disabled{opacity:0.5;cursor:not-allowed;transform:none}
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="shell">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <text x="22" y="32" text-anchor="middle" font-size="28" font-family="Syne,Georgia,serif" font-weight="900" fill="#818cf8">R</text>
          <circle cx="33" cy="33" r="5" fill="#0a0b14"/>
          <circle cx="33" cy="33" r="4" fill="#4ade80"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">Renox<span>Moliya</span></span>
        <span class="logo-sub">MOLIYAVIY DAFTAR</span>
      </div>
    </div>
    <div class="month-nav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="month-label">—</div>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="loading-bar" id="loading-bar"></div>

  <div class="content">
    <div class="summary-bar">
      <div class="sum-card income-card">
        <div class="sum-label">KIRIM</div>
        <div class="sum-val income" id="sum-income">—</div>
        <div class="sum-sub" id="sub-income">yuklanmoqda...</div>
      </div>
      <div class="sum-card expense-card">
        <div class="sum-label">CHIQIM</div>
        <div class="sum-val expense" id="sum-expense">—</div>
        <div class="sum-sub" id="sub-expense">yuklanmoqda...</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">JAMI</div>
        <div class="sum-val total" id="sum-total">—</div>
        <div class="sum-sub" id="sub-total">Balans</div>
      </div>
    </div>
    <div id="txn-list-wrap">
      <div class="empty-state"><span class="empty-ico">⏳</span>Ma'lumotlar yuklanmoqda...</div>
    </div>
  </div>
</div>

<button class="fab" onclick="openModal()" title="Qo'shish">+</button>
<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div class="modal-title">Tranzaksiya qo'shish</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-tabs">
      <div class="ftab active inc" id="ftab-inc" onclick="setFType('income')">KIRIM</div>
      <div class="ftab exp" id="ftab-exp" onclick="setFType('expense')">CHIQIM</div>
    </div>
    <div class="f-row">
      <div class="f-label">SUMMA (UZS)</div>
      <input class="f-input" id="f-amount" type="number" placeholder="0" min="0">
    </div>
    <div class="f-row">
      <div class="f-label">KATEGORIYA</div>
      <select class="f-select" id="f-cat"></select>
    </div>
    <div class="f-row">
      <div class="f-label">SANA</div>
      <input class="f-input" id="f-date" type="date">
    </div>
    <button class="btn-add" id="btn-add" onclick="addTxn()">+ Qo'shish</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB64ULy8Pw_S9e88k--ws1wkxPCBmQTZH8",
  authDomain: "renoxmoliya.firebaseapp.com",
  projectId: "renoxmoliya",
  storageBucket: "renoxmoliya.firebasestorage.app",
  messagingSenderId: "803391523579",
  appId: "1:803391523579:web:bdcfed75ea17fb8f257e5e",
  measurementId: "G-LNF47VHWNF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const txnCol = collection(db, "transactions");

const MONTHS = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
const DAY_NAMES = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
const CATS = {
  income: [{e:'📈',n:'Nomer Sotuv'},{e:'🎁',n:"Sovg'a"},{e:'🤝',n:'Qarz berdi'}],
  expense: [{e:'💵',n:'Depozit'},{e:'👾',n:'Boshqa'}]
};

let curDate = new Date();
curDate = new Date(curDate.getFullYear(), curDate.getMonth(), 1);
let fType = 'income';
let data = [];

const fmt = n => Number(n).toLocaleString('uz-UZ');

function setLoading(on){ document.getElementById('loading-bar').classList.toggle('active', on) }

function showToast(msg, d=2500){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), d);
}

const q = query(txnCol, orderBy('createdAt', 'asc'));
setLoading(true);
onSnapshot(q, snap => {
  data = snap.docs.map(d => ({...d.data(), _docId: d.id}));
  setLoading(false); render();
}, err => { setLoading(false); showToast('❌ Xatolik: '+err.message); });

window.changeMonth = d => {
  curDate = new Date(curDate.getFullYear(), curDate.getMonth()+d, 1); render();
};

window.setFType = t => {
  fType = t;
  document.getElementById('ftab-inc').className = 'ftab'+(t==='income'?' active inc':'');
  document.getElementById('ftab-exp').className = 'ftab'+(t==='expense'?' active exp':'');
  buildCatSelect();
};

function buildCatSelect(){
  const sel = document.getElementById('f-cat');
  if(!sel) return;
  sel.innerHTML = CATS[fType].map(c=>`<option value="${c.n}">${c.e} ${c.n}</option>`).join('');
}

window.openModal = () => {
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-amount').value = '';
};
window.closeModal = () => document.getElementById('modal-bg').classList.remove('open');

window.addTxn = async () => {
  const amt = parseFloat(document.getElementById('f-amount').value)||0;
  const cat = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value;
  if(!amt||!date){ showToast('⚠️ Summa va sanani kiriting!'); return; }
  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = 'Saqlanmoqda...';
  try {
    await addDoc(txnCol, {type:fType, amount:amt, desc:cat, cat, date, createdAt:Date.now()});
    closeModal(); showToast('✅ Saqlandi!');
  } catch(e){ showToast('❌ Xatolik: '+e.message); }
  btn.disabled = false; btn.textContent = "+ Qo'shish";
};

window.deleteTxn = async docId => {
  if(!confirm("O'chirasizmi?")) return;
  try { await deleteDoc(doc(db,"transactions",docId)); showToast("🗑️ O'chirildi"); }
  catch(e){ showToast('❌ '+e.message); }
};

function getCatMap(){
  const m={};
  [...CATS.income,...CATS.expense].forEach(c=>m[c.n]=c.e);
  return m;
}

function render(){
  const y=curDate.getFullYear(), mo=curDate.getMonth();
  document.getElementById('month-label').textContent=`${MONTHS[mo]} ${y}`;
  const md=data.filter(x=>{const p=x.date.split('-');return+p[0]===y&&+p[1]-1===mo});
  const inc=md.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=md.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const net=inc-exp;
  document.getElementById('sum-income').textContent=fmt(inc);
  document.getElementById('sum-expense').textContent=fmt(exp);
  document.getElementById('sum-total').textContent=(net>=0?'+':'')+fmt(net);
  document.getElementById('sum-total').style.color=net>0?'var(--income)':net<0?'var(--expense)':'var(--text)';
  document.getElementById('sub-income').textContent=md.filter(x=>x.type==='income').length+' ta tranzaksiya';
  document.getElementById('sub-expense').textContent=md.filter(x=>x.type==='expense').length+' ta tranzaksiya';

  const groups={};
  md.forEach(x=>{ if(!groups[x.date]) groups[x.date]=[]; groups[x.date].push(x); });
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const wrap=document.getElementById('txn-list-wrap');
  if(!wrap) return;
  if(!dates.length){ wrap.innerHTML=`<div class="empty-state"><span class="empty-ico">💸</span>Bu oy uchun tranzaksiya yo'q</div>`; return; }
  const cm=getCatMap();
  wrap.innerHTML=dates.map((date,gi)=>{
    const items=groups[date].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    const p=date.split('-');
    const d=new Date(+p[0],+p[1]-1,+p[2]);
    const di=items.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
    const de=items.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
    return `<div class="day-group" style="animation-delay:${gi*0.06}s">
      <div class="day-header">
        <div class="day-num">${d.getDate()}</div>
        <div class="day-info">
          <span class="day-name">${DAY_NAMES[d.getDay()]}</span>
          <span class="day-date">${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}</span>
        </div>
        ${di?`<span class="day-inc">UZS ${fmt(di)}</span>`:'<span></span>'}
        ${de?`<span class="day-exp">UZS ${fmt(de)}</span>`:'<span></span>'}
      </div>
      <div class="txn-list">
        ${items.map((x,i)=>{
          const ico=cm[x.cat]||'💰';
          return `<div class="txn-row" style="animation-delay:${(gi*0.06)+(i*0.05)}s" ondblclick="deleteTxn('${x._docId}')" title="O'chirish uchun ikki marta bosing">
            <div class="txn-ico">${ico}</div>
            <div class="txn-info"><div class="txn-name">${x.desc}</div></div>
            <div class="txn-amt ${x.type==='income'?'inc':'exp'}">${x.type==='income'?'+':'-'}UZS ${fmt(x.amount)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

buildCatSelect();
</script>
</body>
</html>
